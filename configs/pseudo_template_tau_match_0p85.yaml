experiment:
  name: pseudo_template_assignment_tau_match_0p85
  seed: 42
  output_dir: results/pseudo_template_tau_match_0p85/

data:
  split_dir: data/all_data_unified/splits/
  train_file: data/all_data_unified/splits/train.tsv
  valid_file: data/all_data_unified/splits/valid.tsv
  test_file: data/all_data_unified/splits/test.tsv

templates:
  template_table: results/templates/templates.tsv
  template_vocab: results/gold_template/template_vocab.json
  gold_labels_train: results/templates/gold_template_labels_train.tsv
  gold_labels_valid: results/templates/gold_template_labels_valid.tsv
  gold_labels_test: results/templates/gold_template_labels_test.tsv

predictions:
  train_predictions: results/gold_template/predictions_train.tsv
  valid_predictions: results/gold_template/predictions_valid.tsv
  test_predictions: results/gold_template/predictions_test.tsv

evidence_paths:
  train_paths: results/gold_template/evidence_paths_train.tsv

matching:
  alpha_node: 0.4
  alpha_relation: 0.6

pseudo_assignment:
  assignment_splits: ["train"]
  tau_pair: 0.7
  tau_match: 0.85
  tau_confidence: 0.75
  w_pair: 0.4
  w_match: 0.4
  w_path: 0.2
