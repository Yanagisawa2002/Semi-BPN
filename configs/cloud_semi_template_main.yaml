experiment:
  name: cloud_semi_template_endpoint_ood_tau_match_0p85
  seed: 42
  output_dir: results/cloud_semi_template_main/

data:
  kg_path: data/cloud_run/biopathnet_full/train1.txt
  split_dir: data/cloud_run/splits/
  train_file: data/cloud_run/splits/train.tsv
  valid_file: data/cloud_run/splits/valid.tsv
  test_file: data/cloud_run/splits/test.tsv

templates:
  template_table: data/cloud_run/templates/templates.tsv
  template_vocab: data/cloud_run/gold_template/template_vocab.json
  gold_labels_train: data/cloud_run/templates/gold_template_labels_train.tsv
  gold_labels_valid: data/cloud_run/templates/gold_template_labels_valid.tsv
  gold_labels_test: data/cloud_run/templates/gold_template_labels_test.tsv
  unknown_template_policy: error

pseudo_templates:
  pseudo_labels_train: data/cloud_run/pseudo_template_main/pseudo_template_labels_train.tsv
  assignment_report: data/cloud_run/pseudo_template_main/assignment_report.json
  use_pseudo_splits: ["train"]
  frozen: true
  allow_gold_pseudo_overlap: false
  allow_test_pseudo: false

model:
  base_model: biopathnet
  template_head: true
  embedding_dim: 64
  hidden_dim: 256
  dropout: 0.0

loss:
  lambda_gold: 1.0
  lambda_pseudo: 0.1

training:
  epochs: 50
  batch_size: 128
  learning_rate: 0.0001
  weight_decay: 0.0
  early_stopping_metric: valid_auprc
  patience: 10

evaluation:
  k_values: [10, 50, 100]
  group_by: endpoint_id

toy_data:
  create_if_missing: false
