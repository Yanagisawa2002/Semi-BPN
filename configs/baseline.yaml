seed: 1024
output_dir: results/baseline

data:
  split_dir: data/all_data_unified/splits

kg:
  path: all_data(indication_only)/forSemi_KG.csv
  required: false

adapter:
  relation_name: affects_endpoint

model:
  embedding_dim: 16

training:
  epochs: 50
  learning_rate: 0.05
  weight_decay: 0.0

evaluation:
  k_values: [10, 50, 100]
  group_by: endpoint_id

toy_data:
  create_if_missing: false
